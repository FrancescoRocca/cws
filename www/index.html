<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cws • home</title>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0a;
                --fg: #f0ede8;
                --muted: #4a4a4a;
                --line: #1e1e1e;
                --accent: #e8e0d0;
            }

            body {
                background: var(--bg);
                color: var(--fg);
                font-family: "DM Sans", sans-serif;
                font-weight: 300;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 40px 24px;
                overflow: hidden;
            }

            /* subtle grid */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(var(--line) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
                background-size: 60px 60px;
                pointer-events: none;
                opacity: 0.5;
            }

            .container {
                position: relative;
                max-width: 600px;
                width: 100%;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                opacity: 0;
                transform: translateY(16px);
                animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
            }

            @keyframes rise {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .status {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: "DM Mono", monospace;
                font-size: 11px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #888;
                margin-bottom: 40px;
            }

            .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #4ade80;
                box-shadow: 0 0 8px #4ade8099;
                animation: pulse 2.5s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            h1 {
                font-size: clamp(42px, 8vw, 64px);
                font-weight: 300;
                line-height: 1.05;
                letter-spacing: -0.03em;
                margin-bottom: 28px;
                color: var(--fg);
                white-space: nowrap;
            }

            h1 em {
                font-style: normal;
                font-family: "DM Mono", monospace;
                font-weight: 300;
                color: var(--muted);
            }

            .divider {
                width: 32px;
                height: 1px;
                background: var(--muted);
                margin-bottom: 28px;
                opacity: 0;
                animation: rise 0.5s ease 0.5s forwards;
            }

            p {
                font-size: 15px;
                line-height: 1.8;
                color: #999;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="status">
                <span class="dot"></span>
                running
            </div>

            <h1>Hello from <em>cws</em></h1>

            <div class="divider"></div>

            <p>
                Default homepage. Replace this file or point your virtual host
                to a different root to serve your own content.
            </p>
        </div>
    </body>
</html>
